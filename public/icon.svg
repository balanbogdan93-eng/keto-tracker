<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#0a0a0f"/>
  <rect width="512" height="512" rx="100" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>
  <!-- Avocado shape -->
  <ellipse cx="256" cy="220" rx="90" ry="120" fill="#10b981"/>
  <ellipse cx="256" cy="230" rx="60" ry="85" fill="#065f46"/>
  <ellipse cx="256" cy="240" rx="35" ry="50" fill="#92400e"/>
  <!-- Spark lines -->
  <path d="M180 370 L210 340 L230 360 L260 310 L280 350 L300 330 L330 370"
        stroke="#f59e0b" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- K letter -->
  <text x="50%" y="88%" dominant-baseline="middle" text-anchor="middle"
        font-family="Arial Black, sans-serif" font-weight="900" font-size="72" fill="white" opacity="0.9">K</text>
</svg>